<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GymFuxionFit — Ecosistema Fitness de Nueva Generación con IA, Biometría y Realidad Aumentada" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>GymFuxionFit — El Futuro del Fitness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // 🕵️‍♂️ NUCLEAR CACHE PURGE V4 (Antigravity Anti-Cache Shield)
      (function() {
        // 1. Limpiar Service Workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let r of registrations) r.unregister();
          });
        }
        
        // 2. Limpiar Caches de la API de Cache
        if ('caches' in window) {
          caches.keys().then(names => {
            for (let n of names) caches.delete(n);
          });
        }

        // 3. Forzar refresco si hay cambio de versión detectado por el Manifiesto
        console.log("🛡️ Escudo Anti-Caché Activado");

        // 🚨 REPORTERO DE ERRORES CRÍTICOS (Para pantalla en blanco)
        window.onerror = function(msg, url, line, col, error) {
          var div = document.createElement('div');
          div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:white;color:black;z-index:100000;padding:20px;font-family:monospace;border-bottom:5px solid red;font-size:12px;';
          div.innerHTML = '<h3 style="color:red;margin:0">🚨 ERROR DE CARGA DETECTADO</h3>' +
                          '<p><b>Mensaje:</b> ' + msg + '</p>' +
                          '<p><b>Archivo:</b> ' + url + '</p>' +
                          '<p><b>Línea:</b> ' + line + ':' + col + '</p>' +
                          '<button onclick="location.reload()" style="padding:10px;background:black;color:white;border:none;cursor:pointer">REINTENTAR</button>';
          document.body.appendChild(div);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
